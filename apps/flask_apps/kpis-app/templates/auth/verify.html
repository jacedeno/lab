{% extends "base.html" %}
{% block title %}Enter PIN — Maintenance KPI Dashboard{% endblock %}

{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height: 60vh;">
  <div class="form-card" style="max-width: 420px; width: 100%;">
    <div class="text-center mb-4">
      <div style="width:48px;height:48px;background:var(--light-green);border-radius:12px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:12px;">
        <i class="bi bi-key" style="font-size:1.4rem;color:var(--primary);"></i>
      </div>
      <h2 style="margin-bottom:4px;">Enter PIN</h2>
      <p style="font-size:0.85rem;color:var(--text-muted);margin:0;">
        We sent a 6-digit PIN to <strong style="color:var(--text-primary);">{{ email }}</strong>
      </p>
    </div>

    <form method="POST" action="{{ url_for('auth.verify') }}">
      <div class="mb-3">
        <label for="pin" class="form-label">Login PIN</label>
        <input type="text" id="pin" name="pin"
               inputmode="numeric" pattern="[0-9]{6}" maxlength="6"
               placeholder="000000"
               autocomplete="one-time-code"
               required autofocus
               class="form-control text-center"
               style="font-family:'JetBrains Mono',monospace;font-size:1.6rem;letter-spacing:0.4em;padding:12px;">
      </div>
      <button type="submit" class="btn-save w-100">Verify</button>
    </form>

    <div class="text-center mt-3">
      <a href="{{ url_for('auth.login') }}" style="font-size:0.84rem;color:var(--primary);text-decoration:none;">
        Request a new PIN
      </a>
    </div>
  </div>
</div>
{% endblock %}
