apiVersion: v1
kind: Service
metadata:
  name: docker-registry
  namespace: docker-registry
  labels:
    app.kubernetes.io/name: docker-registry
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: docker-registry
  ports:
    - port: 5000
      targetPort: 5000
      protocol: TCP
      name: registry
