apiVersion: v1
kind: Secret
metadata:
  name: pr-app-secret
  namespace: purchase-requisition
  labels:
    app.kubernetes.io/name: purchase-requisition
type: Opaque
stringData:
  # ── CHANGE THESE VALUES BEFORE DEPLOYING ──
  # CloudNativePG service: pr-db-rw.purchase-requisition.svc (read-write primary)
  # Password must match k8s/postgres/credentials.yaml
  DATABASE_URL: "postgresql://pr_user:CHANGE_ME_TO_A_STRONG_PASSWORD@pr-db-rw.purchase-requisition.svc:5432/purchase_requisition"
  SECRET_KEY: "CHANGE_ME_TO_A_RANDOM_STRING"
  # SMTP credentials (uncomment when ready)
  # SMTP_USER: ""
  # SMTP_PASS: ""
