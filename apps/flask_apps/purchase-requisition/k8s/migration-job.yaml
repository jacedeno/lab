apiVersion: batch/v1
kind: Job
metadata:
  name: pr-app-migrate
  namespace: purchase-requisition
  labels:
    app.kubernetes.io/name: purchase-requisition
    app.kubernetes.io/component: migration
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: purchase-requisition
        app.kubernetes.io/component: migration
    spec:
      containers:
        - name: migrate
          image: docker-registry.docker-registry.svc.cluster.local:5000/purchase-requisition:v1.3.0
          imagePullPolicy: IfNotPresent
          command: ["flask", "db", "upgrade"]
          envFrom:
            - configMapRef:
                name: pr-app-config
            - secretRef:
                name: pr-app-secret
          env:
            - name: FLASK_APP
              value: "wsgi:app"
      restartPolicy: OnFailure
