apiVersion: apps/v1
kind: Deployment
metadata:
  name: pr-app
  namespace: purchase-requisition
  labels:
    app.kubernetes.io/name: purchase-requisition
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: purchase-requisition
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: purchase-requisition
    spec:
      containers:
        - name: pr-app
          # Update this with your registry endpoint after building
          # Default: docker-registry.docker-registry.svc.cluster.local:5000/purchase-requisition:v1.0.0
          image: docker-registry.docker-registry.svc.cluster.local:5000/purchase-requisition:v1.0.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: pr-app-config
            - secretRef:
                name: pr-app-secret
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      restartPolicy: Always
