apiVersion: apps/v1
kind: Deployment
metadata:
  name: pr-app
  namespace: purchase-requisition
  labels:
    app.kubernetes.io/name: purchase-requisition
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: purchase-requisition
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: purchase-requisition
    spec:
      containers:
        - name: pr-app
          image: purchase-requisition:latest
          # Change to your registry, e.g.:
          # image: registry.capitol.com/purchase-requisition:v1.0.0
          ports:
            - containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: pr-app-config
            - secretRef:
                name: pr-app-secret
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      restartPolicy: Always
