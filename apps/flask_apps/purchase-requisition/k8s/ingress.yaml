apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pr-app
  namespace: purchase-requisition
  labels:
    app.kubernetes.io/name: purchase-requisition
  annotations:
    # K3s uses Traefik by default
    kubernetes.io/ingress.class: traefik
spec:
  rules:
    - host: requisition.capitol.com
      # Change to your actual domain / Cloudflare Tunnel hostname
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pr-app
                port:
                  number: 80
