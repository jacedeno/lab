{% extends "base.html" %}
{% block title %}Sign In - Capitol Aggregates Purchase Requisition{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[60vh]">
    <div class="bg-white border border-gray-200 rounded-lg shadow-sm p-8 w-full max-w-md">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-ca-green">Sign In</h1>
            <p class="text-gray-500 text-sm mt-1">Enter your email to receive a login PIN</p>
        </div>

        <form method="POST" action="{{ url_for('auth.login') }}">
            <div class="mb-4">
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                <input type="email" id="email" name="email"
                       placeholder="name@capitolaggregates.com"
                       required
                       class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm
                              focus:outline-none focus:ring-2 focus:ring-ca-green focus:border-ca-green
                              text-sm">
            </div>

            <button type="submit"
                    class="w-full bg-ca-green text-white font-semibold py-2 px-4 rounded-md
                           hover:bg-green-800 transition-colors text-sm">
                Send PIN
            </button>
        </form>
    </div>
</div>
{% endblock %}
