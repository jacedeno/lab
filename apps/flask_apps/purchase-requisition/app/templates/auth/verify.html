{% extends "base.html" %}
{% block title %}Enter PIN - Capitol Aggregates Purchase Requisition{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[60vh]">
    <div class="bg-white border border-gray-200 rounded-lg shadow-sm p-8 w-full max-w-md">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-ca-green">Enter PIN</h1>
            <p class="text-gray-500 text-sm mt-1">We sent a 6-digit PIN to <strong>{{ email }}</strong></p>
        </div>

        <form method="POST" action="{{ url_for('auth.verify') }}">
            <div class="mb-4">
                <label for="pin" class="block text-sm font-medium text-gray-700 mb-1">Login PIN</label>
                <input type="text" id="pin" name="pin"
                       inputmode="numeric" pattern="[0-9]{6}" maxlength="6"
                       placeholder="000000"
                       autocomplete="one-time-code"
                       required
                       class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm
                              focus:outline-none focus:ring-2 focus:ring-ca-green focus:border-ca-green
                              text-sm text-center text-2xl tracking-[0.5em] font-mono">
            </div>

            <button type="submit"
                    class="w-full bg-ca-green text-white font-semibold py-2 px-4 rounded-md
                           hover:bg-green-800 transition-colors text-sm">
                Verify
            </button>
        </form>

        <div class="mt-4 text-center">
            <a href="{{ url_for('auth.login') }}"
               class="text-ca-green hover:text-ca-gold transition-colors text-sm">
                Request a new PIN
            </a>
        </div>
    </div>
</div>
{% endblock %}
