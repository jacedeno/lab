{% extends "base.html" %}

{% block title %}Capitol Aggregates - Purchase Requisition{% endblock %}

{% block content %}
<div class="text-center py-16">
    <h1 class="text-3xl font-bold text-gray-800 mb-4">Purchase Requisition System</h1>
    <p class="text-gray-600 mb-8">Submit and track purchase requisitions for Capitol Aggregates Inc.</p>
    <div class="flex justify-center space-x-4">
        <a href="{{ url_for('requester.new_pr') }}"
           class="bg-ca-green text-white px-6 py-3 rounded-lg font-semibold
                  hover:bg-green-800 transition-colors">
            Create New PR
        </a>
        <a href="{{ url_for('requester.my_prs') }}"
           class="bg-white text-ca-green px-6 py-3 rounded-lg font-semibold
                  border-2 border-ca-green hover:bg-green-50 transition-colors">
            View My PRs
        </a>
    </div>
</div>
{% endblock %}
