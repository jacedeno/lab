version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: purchase_requisition
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    ports:
      - "5000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/purchase_requisition
      DEV_USER_EMAIL: dev@capitol.com
      BUYER_EMAILS: buyer@capitol.com
      SECRET_KEY: dev-secret-change-me
      FLASK_ENV: development
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
